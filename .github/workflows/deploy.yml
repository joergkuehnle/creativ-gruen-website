# .github/workflows/deploy.yml
# In das Repo joergkuehnle/creativ-gruen-website legen
# Trigger: Push auf main → deployt automatisch auf Hostinger VPS

name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH-Key einrichten
        run: |
          mkdir -p ~/.ssh
          cat > ~/.ssh/deploy_key << 'SSHKEY'
          ${{ secrets.SSH_PRIVATE_KEY }}
          SSHKEY
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H srv1650992.hstgr.cloud >> ~/.ssh/known_hosts 2>/dev/null

      - name: Git pull auf dem Server
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new root@srv1650992.hstgr.cloud "
            cd /var/www/creativ-gruen.de
            git pull
            echo \"Deploy: \$(git log -1 --oneline)\"
          "

      - name: nginx reload (nur bei Config-Änderung)
        run: |
          ssh -i ~/.ssh/deploy_key root@srv1650992.hstgr.cloud "
            if [ -f /etc/nginx/sites-enabled/creativ-gruen.de ]; then
              nginx -t && systemctl reload nginx
            fi
          "
