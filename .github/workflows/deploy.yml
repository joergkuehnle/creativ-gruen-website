# .github/workflows/deploy.yml
# In das Repo joergkuehnle/creativ-gruen-website legen
# Trigger: Push auf main → deployt automatisch auf Hostinger VPS

name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH-Key einrichten
        run: |
          mkdir -p ~/.ssh
          cat > ~/.ssh/deploy_key << 'SSHKEY'
          ${{ secrets.SSH_PRIVATE_KEY }}
          SSHKEY
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H srv1650992.hstgr.cloud >> ~/.ssh/known_hosts 2>/dev/null

      - name: Git pull und nginx reload auf dem Server
        env:
          DEPLOY_CMD: |
            cd /var/www/creativ-gruen.de && git pull && echo "OK: $(git log -1 --oneline)" && nginx -t && systemctl reload nginx
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new root@srv1650992.hstgr.cloud "$DEPLOY_CMD"
